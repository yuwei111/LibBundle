name: Build VisualBundle Windows EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'


    - name: Restore dependencies
      run: dotnet restore ./VisualBundle/VisualBundle.csproj


    - name: Build solution
      run: dotnet build ./VisualBundle/VisualBundle.csproj --configuration Release --no-restore


    - name: Publish self-contained EXE
      run: dotnet publish ./VisualBundle/VisualBundle.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish


    - name: Upload VisualBundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualBundle
        path: publish/*
